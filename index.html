<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Koilp 的 GoreBox Lua 混淆器 V5 </title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        h1 {
            text-align: center;
            color: #ffaa33;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .col {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0d0d0d;
            border: 1px solid #555;
            color: #ccc;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #ffaa33;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }
        button {
            background: #3a3a3a;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #555;
            flex: 1;
            min-width: 120px;
        }
        button:hover {
            background: #ffaa33;
            color: #1a1a1a;
            border-color: #ffaa33;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        .output-container {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
        }
        .copy-btn:hover { opacity: 1; }
        .watermark {
            color: #ffaa33;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.6;
            text-align: center;
        }
        @media (max-width: 700px) {
            .col { min-width: 100%; }
            textarea { height: 250px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 Koilp 的 GoreBox Lua 混淆器 V5 </h1>
    <div class="row">
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">📄 原始代码</label>
            <textarea id="inputCode" placeholder="粘贴你的 Lua 代码...">function Update()
    if a == true then
        local b = false
        b = true
    end
end</textarea>
        </div>
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">⚡ 混淆结果</label>
            <div class="output-container">
                <textarea id="outputCode" readonly placeholder="混淆后的代码将显示在这里..."></textarea>
                <button class="copy-btn" id="copyBtn">📋 复制</button>
            </div>
        </div>
    </div>
    <div class="buttons">
        <button id="obfuscateBtn">🚀 执行混淆</button>
        <button id="clearBtn">🗑️ 清空</button>
    </div>
    <div class="watermark">--[[ Koilp混淆V5 独家水印 ]]--</div>
</div>

<script>
(function() {
    const WATERMARK = `--[[
Koilp混淆V5独家水印;)

......              .......                             ......
......           .......                                ......
......        .......                            ......    ......
......     .......                               ......    ......  ......     .........
......  ........                 ...............                ......     ......       ......
......  ........             .......        ......      ......    ......    ......          ......
......     .......         .......           .......    ......    ......    ......          ......
......        .......      .......           .......    ......    ......    ......         ......
......           .......    .......         .......     ......    ......    ......   ........
......              ......      ...............         ......    ......    ......
.                                                        ......
  .                                                      ......
    .                                                    ......
       .                                                 ......
                                                        
]]--`;

    // 工具函数
    function randomVarName(prefix) {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < 12; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return (prefix || '_st_') + result;
    }

    function fourOpExpr(num) {
        const ops = ['+', '-'];
        let parts = [String(num)];
        for (let i = 0; i < 4; i++) {
            const a = Math.floor(Math.random() * 200) + 1;
            const b = Math.floor(Math.random() * 200) + 1;
            const expr = `(${a+b}-${a+b})`;
            const op = ops[Math.floor(Math.random() * ops.length)];
            parts.push(op + expr);
        }
        return '(' + parts.join('') + ')';
    }

    function stringToCharCall(str) {
        if (str === '') return '""';
        const chars = [];
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            const expr = fourOpExpr(code);
            chars.push(expr);
        }
        return 'string.char(' + chars.join(', ') + ')';
    }

    // 混淆变量名（支持多变量声明）
    function obfuscateVariables(code) {
        const funcNames = new Set();
        const funcRegex = /(?:local\s+)?function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
        let match;
        while ((match = funcRegex.exec(code)) !== null) {
            funcNames.add(match[1]);
        }

        const localVars = new Set();
        const localDeclRegex = /local\s+((?:[a-zA-Z_]\w*\s*,\s*)*[a-zA-Z_]\w*)/g;
        while ((match = localDeclRegex.exec(code)) !== null) {
            const list = match[1];
            const names = list.split(',').map(s => s.trim());
            for (let name of names) {
                if (name && !funcNames.has(name) && !isKeyword(name)) {
                    localVars.add(name);
                }
            }
        }

        const nameMap = new Map();
        localVars.forEach(name => {
            let newName;
            do {
                newName = randomVarName('v_');
            } while (nameMap.has(newName) || funcNames.has(newName) || isKeyword(newName));
            nameMap.set(name, newName);
        });

        let obfuscated = code;
        nameMap.forEach((newName, oldName) => {
            const regex = new RegExp('\\b' + oldName + '\\b', 'g');
            obfuscated = obfuscated.replace(regex, newName);
        });
        return obfuscated;
    }

    function isKeyword(name) {
        const keywords = ['and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'if', 'in', 'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'];
        return keywords.includes(name);
    }

    // 将一段代码转换为状态机风格（标准风格）
    function convertToStateMachine(code, stateVar) {
        const lines = code.split('\n').filter(l => l.trim() !== '');
        if (lines.length === 0) return '';

        // 如果是单行代码，直接返回
        if (lines.length === 1) {
            return lines[0];
        }

        // 多行代码分组为逻辑块
        // 简单分组：每2-4行一组
        const groups = [];
        let currentGroup = [];
        for (let i = 0; i < lines.length; i++) {
            currentGroup.push(lines[i]);
            // 每2-4行一组，或者遇到空行
            if (currentGroup.length >= 3 + Math.floor(Math.random() * 2) || i === lines.length - 1) {
                groups.push(currentGroup);
                currentGroup = [];
            }
        }
        if (currentGroup.length > 0) {
            groups.push(currentGroup);
        }

        let result = 'local ' + stateVar + ' = 0\n';
        result += 'while true do\n';

        for (let i = 0; i < groups.length; i++) {
            const group = groups[i];
            const groupCode = group.join('\n');
            const nextState = i + 1;

            if (i === 0) {
                result += '    if ' + stateVar + ' == 0 then\n';
            } else {
                result += '    elseif ' + stateVar + ' == ' + i + ' then\n';
            }

            // 处理组内代码
            const indentedCode = groupCode.split('\n').map(l => '        ' + l).join('\n');
            result += indentedCode + '\n';

            if (i === groups.length - 1) {
                result += '        break\n';
            } else {
                result += '        ' + stateVar + ' = ' + nextState + '\n';
            }
            result += '    end\n';
        }

        result += 'end';
        return result;
    }

    // 检查代码是否已经是状态机风格
    function isStateMachine(code) {
        return code.includes('while true do') && code.includes('local state = 0');
    }

    // 主混淆函数
    function obfuscate(code) {
        // 1. 处理字符串字面量
        let obfuscated = code;
        const stringRegex = /"([^"\\]*(\\.[^"\\]*)*)"/g;
        let matches;
        let replacements = [];
        while ((matches = stringRegex.exec(code)) !== null) {
            const full = matches[0];
            const content = matches[1];
            const charCall = stringToCharCall(content);
            replacements.push({ start: matches.index, end: matches.index + full.length, replacement: charCall });
        }
        for (let i = replacements.length - 1; i >= 0; i--) {
            const r = replacements[i];
            obfuscated = obfuscated.substring(0, r.start) + r.replacement + obfuscated.substring(r.end);
        }

        // 2. 变量名混淆
        obfuscated = obfuscateVariables(obfuscated);

        // 3. 将函数体转换为状态机风格
        // 匹配 function name(args) ... end
        const funcRegex = /(function\s+([a-zA-Z_]\w*)\s*\([^)]*\)\s*)([\s\S]*?)(\s*end)/g;
        obfuscated = obfuscated.replace(funcRegex, function(match, prefix, funcName, body, suffix) {
            // 如果已经是状态机，跳过
            if (isStateMachine(body)) {
                return match;
            }
            const stateVar = randomVarName('_st_');
            const convertedBody = convertToStateMachine(body, stateVar);
            return prefix + convertedBody + suffix;
        });

        // 匹配匿名函数
        const anonFuncRegex = /(function\s*\([^)]*\)\s*)([\s\S]*?)(\s*end)/g;
        obfuscated = obfuscated.replace(anonFuncRegex, function(match, prefix, body, suffix) {
            if (isStateMachine(body)) {
                return match;
            }
            const stateVar = randomVarName('_st_');
            const convertedBody = convertToStateMachine(body, stateVar);
            return prefix + convertedBody + suffix;
        });

        // 4. 压缩为单行（保留状态机结构但去掉多余空格和换行）
        obfuscated = obfuscated.replace(/\s+/g, ' ').trim();
        // 修复压缩后的一些格式问题
        obfuscated = obfuscated.replace(/end\s+end/g, 'end end');
        obfuscated = obfuscated.replace(/then\s+local/g, 'then local');
        obfuscated = obfuscated.replace(/do\s+local/g, 'do local');

        // 5. 添加水印
        const finalCode = WATERMARK + '\n\n' + obfuscated;
        return finalCode;
    }

    // UI 交互
    const inputEl = document.getElementById('inputCode');
    const outputEl = document.getElementById('outputCode');
    const obfuscateBtn = document.getElementById('obfuscateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    obfuscateBtn.addEventListener('click', function() {
        const source = inputEl.value;
        if (!source.trim()) {
            outputEl.value = '请先输入 Lua 代码！';
            return;
        }
        try {
            const result = obfuscate(source);
            outputEl.value = result;
        } catch (e) {
            outputEl.value = '混淆出错: ' + e.message + '\n' + e.stack;
        }
    });

    clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.value = '';
    });

    copyBtn.addEventListener('click', function() {
        const text = outputEl.value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = copyBtn.textContent;
            copyBtn.textContent = '✅ 已复制';
            setTimeout(() => copyBtn.textContent = orig, 2000);
        }).catch(() => {
            outputEl.select();
            document.execCommand('copy');
        });
    });

    // 默认示例
    const defaultCode = `function Update()
    if a == true then
        local b = false
        b = true
    end
end

function test(x)
    local y = 0
    for i = 1, 10 do
        y = y + i
    end
    return y
end`;
    inputEl.value = defaultCode;
})();
</script>
</body>
</html>
