<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoreBox Lua 混淆器 V3</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
        }
        h1 {
            text-align: center;
            color: #ffaa33;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .col {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0d0d0d;
            border: 1px solid #555;
            color: #ccc;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #ffaa33;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }
        button {
            background: #3a3a3a;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #555;
            flex: 1;
            min-width: 120px;
            white-space: nowrap;
        }
        button:hover {
            background: #ffaa33;
            color: #1a1a1a;
            border-color: #ffaa33;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        button.upload-btn:hover {
            background: #4caf50;
            border-color: #4caf50;
            color: #fff;
        }
        button.download-btn:hover {
            background: #2196f3;
            border-color: #2196f3;
            color: #fff;
        }
        .badge {
            font-size: 12px;
            color: #888;
            text-align: right;
            margin-top: 8px;
        }
        .output-container {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
            min-width: auto;
            flex: none;
        }
        .copy-btn:hover {
            opacity: 1;
            background: #ffaa33;
            color: #1a1a1a;
        }
        .watermark {
            color: #ffaa33;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.6;
            text-align: center;
        }
        .file-status {
            font-size: 12px;
            color: #888;
            margin-left: 8px;
            font-weight: normal;
        }
        @media (max-width: 700px) {
            .col {
                min-width: 100%;
            }
            textarea {
                height: 250px;
            }
            button {
                white-space: normal;
                min-width: 80px;
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 GoreBox Lua 混淆器 V3</h1>
        <div class="row">
            <div class="col">
                <label style="margin-bottom:6px; font-weight:bold;">
                    📄 原始代码
                    <span class="file-status" id="fileStatus"></span>
                </label>
                <textarea id="inputCode" placeholder="粘贴你的 Lua 代码...">local SS, DD = 78
                    local myVar = "Hello"
                    function test(a)
                    local b = a + 1
                    return b
                    end
                local data = { name = "GoreBox", version = "1.0" }</textarea>
            </div>
            <div class="col">
                <label style="margin-bottom:6px; font-weight:bold;">⚡ 混淆结果</label>
                <div class="output-container">
                    <textarea id="outputCode" readonly placeholder="混淆后的代码将显示在这里..."></textarea>
                    <button class="copy-btn" id="copyBtn">📋 复制</button>
                </div>
            </div>
        </div>
        <div class="buttons">
            <button id="obfuscateBtn">🚀 执行混淆</button>
            <button id="clearBtn">🗑️ 清空</button>
            <button id="uploadBtn" class="upload-btn">📤 上传Lua文件</button>
            <button id="downloadBtn" class="download-btn">📥 下载Lua文件</button>
        </div>
        <div class="watermark">--[[ Koilp混淆V3 独家水印 ]]--</div>
    </div>

    <script>
        (function() {
            // ---------- 配置 ----------
            const WATERMARK = `--[[
        Koilp混淆V3独家水印:)

        ......              .......                             ......
        ......           .......                                ......
        ......        .......                            ......    ......
        ......     .......                               ......    ......  ......     .........
        ......  ........                 ...............                ......     ......       ......
        ......  ........             .......        ......      ......    ......    ......          ......
        ......     .......         .......           .......    ......    ......    ......          ......
        ......        .......      .......           .......    ......    ......    ......         ......
        ......           .......    .......         .......     ......    ......    ......   ........
        ......              ......      ...............         ......    ......    ......
        .                                                        ......
        .                                                      ......
        .                                                    ......
        .                                                 ......

        ]]--`;

            // ---------- 工具函数 ----------
            function randomVarName() {
                const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let result = '';
                for (let i = 0; i < 20; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                const suffix = Math.floor(Math.random() * 1000000).toString(16);
                return 'v_' + result + '_' + suffix;
            }

            function fourOpExpr(num) {
                const ops = ['+', '-'];
                let parts = [String(num)];
                for (let i = 0; i < 4; i++) {
                    const a = Math.floor(Math.random() * 200) + 1;
                    const b = Math.floor(Math.random() * 200) + 1;
                    const expr = `(${a+b}-${a+b})`;
                    const op = ops[Math.floor(Math.random() * ops.length)];
                    parts.push(op + expr);
                }
                return '(' + parts.join('') + ')';
            }

            function stringToCharCall(str) {
                if (str === '') return '""';
                const chars = [];
                for (let i = 0; i < str.length; i++) {
                    const code = str.charCodeAt(i);
                    const expr = fourOpExpr(code);
                    chars.push(expr);
                }
                return 'string.char(' + chars.join(', ') + ')';
            }

            function obfuscateVariables(code, varMap) {
                const funcNames = new Set();
                const funcRegex = /(?:local\s+)?function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
                let match;
                while ((match = funcRegex.exec(code)) !== null) {
                    funcNames.add(match[1]);
                }

                const localVars = new Set();
                const localDeclRegex = /local\s+((?:[a-zA-Z_]\w*\s*,\s*)*[a-zA-Z_]\w*)/g;
                while ((match = localDeclRegex.exec(code)) !== null) {
                    const list = match[1];
                    const names = list.split(',').map(s => s.trim());
                    for (let name of names) {
                        if (name && !funcNames.has(name) && !isKeyword(name)) {
                            localVars.add(name);
                        }
                    }
                }

                const nameMap = new Map();
                localVars.forEach(name => {
                    let newName;
                    do {
                        newName = randomVarName();
                    } while (nameMap.has(newName) || funcNames.has(newName) || isKeyword(newName));
                    nameMap.set(name, newName);
                });

                let obfuscated = code;
                nameMap.forEach((newName, oldName) => {
                    const regex = new RegExp('\\b' + oldName + '\\b', 'g');
                    obfuscated = obfuscated.replace(regex, newName);
                });
                return obfuscated;
            }

            function isKeyword(name) {
                const keywords = ['and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'if', 'in',
                    'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'
                ];
                return keywords.includes(name);
            }

            function obfuscate(code) {
                let obfuscated = code;
                const stringRegex = /"([^"\\]*(\\.[^"\\]*)*)"/g;
                let matches;
                let replacements = [];
                while ((matches = stringRegex.exec(code)) !== null) {
                    const full = matches[0];
                    const content = matches[1];
                    const charCall = stringToCharCall(content);
                    replacements.push({ start: matches.index, end: matches.index + full.length, replacement: charCall });
                }
                for (let i = replacements.length - 1; i >= 0; i--) {
                    const r = replacements[i];
                    obfuscated = obfuscated.substring(0, r.start) + r.replacement + obfuscated.substring(r.end);
                }

                const varMap = new Map();
                obfuscated = obfuscateVariables(obfuscated, varMap);

                let oneLine = obfuscated.replace(/\s+/g, ' ').trim();
                const wrapped = 'while true do ' + oneLine + ' break end';
                const finalCode = WATERMARK + '\n\n' + wrapped;
                return finalCode;
            }

            // ---------- DOM 引用 ----------
            const inputEl = document.getElementById('inputCode');
            const outputEl = document.getElementById('outputCode');
            const obfuscateBtn = document.getElementById('obfuscateBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const fileStatus = document.getElementById('fileStatus');

            // ---------- 文件上传 ----------
            let uploadedFileName = null;

            // 创建隐藏的 file input
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.lua,.txt';
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);

            uploadBtn.addEventListener('click', function() {
                fileInput.click();
            });

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const content = ev.target.result;
                        inputEl.value = content;
                        uploadedFileName = file.name.replace(/\.[^.]+$/, '');
                        fileStatus.textContent = '📎 ' + file.name;
                        // 清空 output，因为原代码变了
                        outputEl.value = '';
                    } catch (err) {
                        alert('读取文件失败: ' + err.message);
                    }
                };
                reader.onerror = function() {
                    alert('读取文件失败，请重试。');
                };
                reader.readAsText(file, 'UTF-8');
                // 重置 input，允许重复上传同一文件
                fileInput.value = '';
            });

            // ---------- 文件下载 ----------
            downloadBtn.addEventListener('click', function() {
                const content = outputEl.value;
                if (!content || content.trim() === '') {
                    alert('⚠️ 没有内容可下载，请先执行混淆。');
                    return;
                }

                let baseName = uploadedFileName || 'obfuscated';
                let fileName = baseName + '_obfuscated.lua';

                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);

                const orig = downloadBtn.textContent;
                downloadBtn.textContent = '✅ 已下载';
                setTimeout(() => downloadBtn.textContent = orig, 2000);
            });

            // ---------- 原有功能 ----------
            obfuscateBtn.addEventListener('click', function() {
                const source = inputEl.value;
                try {
                    const result = obfuscate(source);
                    outputEl.value = result;
                } catch (e) {
                    outputEl.value = '混淆出错: ' + e.message;
                }
            });

            clearBtn.addEventListener('click', function() {
                inputEl.value = '';
                outputEl.value = '';
                fileStatus.textContent = '';
                uploadedFileName = null;
            });

            copyBtn.addEventListener('click', function() {
                const text = outputEl.value;
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const orig = copyBtn.textContent;
                    copyBtn.textContent = '✅ 已复制';
                    setTimeout(() => copyBtn.textContent = orig, 2000);
                }).catch(() => {
                    outputEl.select();
                    document.execCommand('copy');
                });
            });

            // ---------- 默认示例（与原来一致） ----------
            const defaultCode = `local SS, DD = 78
        local myVar = "Hello"
        function test(a)
            local b = a + 1
            return b
        end
        local data = { name = "GoreBox", version = "1.0" }`;
            inputEl.value = defaultCode;
        })();
    </script>
</body>
</html>
