<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koilp 的 GoreBox Lua 混淆器 V4 </title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        h1 {
            text-align: center;
            color: #ffaa33;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .col {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0d0d0d;
            border: 1px solid #555;
            color: #ccc;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #ffaa33;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }
        button {
            background: #3a3a3a;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #555;
            flex: 1;
            min-width: 120px;
        }
        button:hover {
            background: #ffaa33;
            color: #1a1a1a;
            border-color: #ffaa33;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        .output-container {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
        }
        .copy-btn:hover { opacity: 1; }
        .watermark {
            color: #ffaa33;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.6;
            text-align: center;
        }
        @media (max-width: 700px) {
            .col { min-width: 100%; }
            textarea { height: 250px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 Koilp 的 GoreBox Lua 混淆器 V4 </h1>
    <div class="row">
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">📄 原始代码</label>
            <textarea id="inputCode" placeholder="粘贴你的 Lua 代码...">function Update()
    if a == true then
        local b = false
        b = true
    end
end</textarea>
        </div>
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">⚡ 混淆结果</label>
            <div class="output-container">
                <textarea id="outputCode" readonly placeholder="混淆后的代码将显示在这里..."></textarea>
                <button class="copy-btn" id="copyBtn">📋 复制</button>
            </div>
        </div>
    </div>
    <div class="buttons">
        <button id="obfuscateBtn">🚀 执行混淆</button>
        <button id="clearBtn">🗑️ 清空</button>
    </div>
    <div class="watermark">--[[ Koilp混淆V4 独家水印 ]]--</div>
</div>

<script>
(function() {
    const WATERMARK = `--[[
Koilp混淆V4独家水印:)

......              .......                             ......
......           .......                                ......
......        .......                            ......    ......
......     .......                               ......    ......  ......     .........
......  ........                 ...............                ......     ......       ......
......  ........             .......        ......      ......    ......    ......          ......
......     .......         .......           .......    ......    ......    ......          ......
......        .......      .......           .......    ......    ......    ......         ......
......           .......    .......         .......     ......    ......    ......   ........
......              ......      ...............         ......    ......    ......
.                                                        ......
  .                                                      ......
    .                                                    ......
       .                                                 ......
                                                        
]]--`;

    // 工具：随机变量名
    function randomVarName() {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < 16; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return '_st_' + result;
    }

    // 生成四次运算表达式
    function fourOpExpr(num) {
        const ops = ['+', '-'];
        let parts = [String(num)];
        for (let i = 0; i < 4; i++) {
            const a = Math.floor(Math.random() * 200) + 1;
            const b = Math.floor(Math.random() * 200) + 1;
            const expr = `(${a+b}-${a+b})`;
            const op = ops[Math.floor(Math.random() * ops.length)];
            parts.push(op + expr);
        }
        return '(' + parts.join('') + ')';
    }

    function stringToCharCall(str) {
        if (str === '') return '""';
        const chars = [];
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            const expr = fourOpExpr(code);
            chars.push(expr);
        }
        return 'string.char(' + chars.join(', ') + ')';
    }

    // 混淆变量名（支持多变量声明）
    function obfuscateVariables(code) {
        const funcNames = new Set();
        const funcRegex = /(?:local\s+)?function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
        let match;
        while ((match = funcRegex.exec(code)) !== null) {
            funcNames.add(match[1]);
        }

        const localVars = new Set();
        const localDeclRegex = /local\s+((?:[a-zA-Z_]\w*\s*,\s*)*[a-zA-Z_]\w*)/g;
        while ((match = localDeclRegex.exec(code)) !== null) {
            const list = match[1];
            const names = list.split(',').map(s => s.trim());
            for (let name of names) {
                if (name && !funcNames.has(name) && !isKeyword(name)) {
                    localVars.add(name);
                }
            }
        }

        const nameMap = new Map();
        localVars.forEach(name => {
            let newName;
            do {
                newName = randomVarName();
            } while (nameMap.has(newName) || funcNames.has(newName) || isKeyword(newName));
            // 确保新名称不是 "true", "false", "nil" 等
            nameMap.set(name, newName);
        });

        let obfuscated = code;
        nameMap.forEach((newName, oldName) => {
            const regex = new RegExp('\\b' + oldName + '\\b', 'g');
            obfuscated = obfuscated.replace(regex, newName);
        });
        return obfuscated;
    }

    function isKeyword(name) {
        const keywords = ['and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'if', 'in', 'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'];
        return keywords.includes(name);
    }

    // 块级状态机混淆
    function obfuscateBlock(code) {
        // 递归处理每个块
        let result = code;
        
        // 处理函数体: function name(args) ... end
        const funcRegex = /(function\s+([a-zA-Z_]\w*)\s*\([^)]*\)\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(funcRegex, function(match, prefix, funcName, body, suffix) {
            // 处理函数体内部
            const bodyObfuscated = obfuscateBlock(body);
            // 用状态机包裹函数体
            const stVar = randomVarName();
            const obfuscatedBody = wrapWithStateMachine(bodyObfuscated, stVar);
            return prefix + obfuscatedBody + suffix;
        });

        // 处理匿名函数: function(args) ... end
        const anonFuncRegex = /(function\s*\([^)]*\)\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(anonFuncRegex, function(match, prefix, body, suffix) {
            const bodyObfuscated = obfuscateBlock(body);
            const stVar = randomVarName();
            const obfuscatedBody = wrapWithStateMachine(bodyObfuscated, stVar);
            return prefix + obfuscatedBody + suffix;
        });

        // 处理 if 块: if cond then ... elseif cond then ... else ... end
        const ifRegex = /(if\s+[^t]*then\s*)([\s\S]*?)(\s*elseif\s+[^t]*then\s*)([\s\S]*?)(\s*else\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(ifRegex, function(match, ifPrefix, ifBody, elseifPrefix, elseifBody, elsePrefix, elseBody, endSuffix) {
            const stVar = randomVarName();
            // 分别混淆各分支
            const ifObfuscated = obfuscateBlock(ifBody);
            const elseifObfuscated = obfuscateBlock(elseifBody);
            const elseObfuscated = obfuscateBlock(elseBody);
            
            // 用状态机包裹整个 if-elseif-else
            let wrapped = 'local ' + stVar + ' = 0\n';
            wrapped += 'while true do\n';
            wrapped += '    if ' + stVar + ' == 0 then\n';
            wrapped += '        ' + ifPrefix.trim() + '\n';
            wrapped += '        local ' + stVar + '_sub = 0\n';
            wrapped += '        while true do\n';
            wrapped += '            if ' + stVar + '_sub == 0 then\n';
            // 递归处理 if 内部
            const processedIf = wrapWithStateMachine(ifObfuscated, stVar + '_inner');
            wrapped += '                ' + processedIf.replace(/\n/g, '\n                ') + '\n';
            wrapped += '                ' + stVar + '_sub = 1\n';
            wrapped += '            elseif ' + stVar + '_sub == 1 then\n';
            wrapped += '                ' + stVar + ' = 1\n';
            wrapped += '                break\n';
            wrapped += '            end\n';
            wrapped += '        end\n';
            wrapped += '    elseif ' + stVar + ' == 1 then\n';
            // elseif 分支
            const processedElseif = wrapWithStateMachine(elseifObfuscated, stVar + '_elseif');
            wrapped += '        ' + elseifPrefix.trim() + '\n';
            wrapped += '        local ' + stVar + '_sub2 = 0\n';
            wrapped += '        while true do\n';
            wrapped += '            if ' + stVar + '_sub2 == 0 then\n';
            wrapped += '                ' + processedElseif.replace(/\n/g, '\n                ') + '\n';
            wrapped += '                ' + stVar + '_sub2 = 1\n';
            wrapped += '            elseif ' + stVar + '_sub2 == 1 then\n';
            wrapped += '                ' + stVar + ' = 2\n';
            wrapped += '                break\n';
            wrapped += '            end\n';
            wrapped += '        end\n';
            wrapped += '    elseif ' + stVar + ' == 2 then\n';
            // else 分支
            const processedElse = wrapWithStateMachine(elseObfuscated, stVar + '_else');
            wrapped += '        ' + elsePrefix.trim() + '\n';
            wrapped += '        local ' + stVar + '_sub3 = 0\n';
            wrapped += '        while true do\n';
            wrapped += '            if ' + stVar + '_sub3 == 0 then\n';
            wrapped += '                ' + processedElse.replace(/\n/g, '\n                ') + '\n';
            wrapped += '                ' + stVar + '_sub3 = 1\n';
            wrapped += '            elseif ' + stVar + '_sub3 == 1 then\n';
            wrapped += '                break\n';
            wrapped += '            end\n';
            wrapped += '        end\n';
            wrapped += '        break\n';
            wrapped += '    end\n';
            wrapped += 'end';
            return wrapped;
        });

        // 处理简单的 if-then-end (没有 elseif/else)
        const simpleIfRegex = /(if\s+[^t]*then\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(simpleIfRegex, function(match, prefix, body, suffix) {
            // 检查是否已经被上面的复杂 if 处理过
            if (match.includes('elseif') || match.includes('else')) {
                return match;
            }
            const stVar = randomVarName();
            const bodyObfuscated = obfuscateBlock(body);
            const wrappedBody = wrapWithStateMachine(bodyObfuscated, stVar + '_inner');
            return 'local ' + stVar + ' = 0\n' +
                   'while true do\n' +
                   '    if ' + stVar + ' == 0 then\n' +
                   '        ' + prefix.trim() + '\n' +
                   '        ' + wrappedBody.replace(/\n/g, '\n        ') + '\n' +
                   '        ' + stVar + ' = 1\n' +
                   '    elseif ' + stVar + ' == 1 then\n' +
                   '        break\n' +
                   '    end\n' +
                   'end';
        });

        // 处理 for 循环: for var = start, stop do ... end
        const forRegex = /(for\s+[a-zA-Z_]\w*\s*=\s*[^,]*,\s*[^,]*\s*(?:,\s*[^)]*)?\s+do\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(forRegex, function(match, prefix, body, suffix) {
            const stVar = randomVarName();
            const bodyObfuscated = obfuscateBlock(body);
            const wrappedBody = wrapWithStateMachine(bodyObfuscated, stVar + '_inner');
            return 'local ' + stVar + ' = 0\n' +
                   'while true do\n' +
                   '    if ' + stVar + ' == 0 then\n' +
                   '        ' + prefix.trim() + '\n' +
                   '        ' + wrappedBody.replace(/\n/g, '\n        ') + '\n' +
                   '        ' + stVar + ' = 1\n' +
                   '    elseif ' + stVar + ' == 1 then\n' +
                   '        break\n' +
                   '    end\n' +
                   'end';
        });

        // 处理 while 循环: while cond do ... end
        const whileRegex = /(while\s+[^d]*do\s*)([\s\S]*?)(\s*end)/g;
        result = result.replace(whileRegex, function(match, prefix, body, suffix) {
            const stVar = randomVarName();
            const bodyObfuscated = obfuscateBlock(body);
            const wrappedBody = wrapWithStateMachine(bodyObfuscated, stVar + '_inner');
            return 'local ' + stVar + ' = 0\n' +
                   'while true do\n' +
                   '    if ' + stVar + ' == 0 then\n' +
                   '        ' + prefix.trim() + '\n' +
                   '        ' + wrappedBody.replace(/\n/g, '\n        ') + '\n' +
                   '        ' + stVar + ' = 1\n' +
                   '    elseif ' + stVar + ' == 1 then\n' +
                   '        break\n' +
                   '    end\n' +
                   'end';
        });

        // 处理 repeat-until: repeat ... until cond
        const repeatRegex = /(repeat\s*)([\s\S]*?)(\s*until\s+[^;]*)/g;
        result = result.replace(repeatRegex, function(match, prefix, body, suffix) {
            const stVar = randomVarName();
            const bodyObfuscated = obfuscateBlock(body);
            const wrappedBody = wrapWithStateMachine(bodyObfuscated, stVar + '_inner');
            return 'local ' + stVar + ' = 0\n' +
                   'while true do\n' +
                   '    if ' + stVar + ' == 0 then\n' +
                   '        ' + prefix.trim() + '\n' +
                   '        ' + wrappedBody.replace(/\n/g, '\n        ') + '\n' +
                   '        ' + stVar + ' = 1\n' +
                   '    elseif ' + stVar + ' == 1 then\n' +
                   '        ' + suffix.trim() + '\n' +
                   '        break\n' +
                   '    end\n' +
                   'end';
        });

        return result;
    }

    // 用状态机包裹一段代码
    function wrapWithStateMachine(code, stVar) {
        // 分割成多行
        const lines = code.split('\n');
        if (lines.length <= 1) {
            // 单行代码，简单包裹
            return 'local ' + stVar + ' = 0\n' +
                   'while true do\n' +
                   '    if ' + stVar + ' == 0 then\n' +
                   '        ' + code + '\n' +
                   '        ' + stVar + ' = 1\n' +
                   '    elseif ' + stVar + ' == 1 then\n' +
                   '        break\n' +
                   '    end\n' +
                   'end';
        }

        // 多行代码，逐行分配状态
        let result = 'local ' + stVar + ' = 0\n';
        result += 'while true do\n';
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line === '') continue;
            if (i === 0) {
                result += '    if ' + stVar + ' == 0 then\n';
                result += '        ' + line + '\n';
                if (lines.length === 1) {
                    result += '        ' + stVar + ' = 1\n';
                } else {
                    result += '        ' + stVar + ' = 1\n';
                }
            } else if (i === lines.length - 1) {
                result += '    elseif ' + stVar + ' == ' + i + ' then\n';
                result += '        ' + line + '\n';
                result += '        ' + stVar + ' = ' + (i + 1) + '\n';
            } else {
                result += '    elseif ' + stVar + ' == ' + i + ' then\n';
                result += '        ' + line + '\n';
                result += '        ' + stVar + ' = ' + (i + 1) + '\n';
            }
        }
        result += '    elseif ' + stVar + ' == ' + lines.length + ' then\n';
        result += '        break\n';
        result += '    end\n';
        result += 'end';
        return result;
    }

    // 主混淆函数
    function obfuscate(code) {
        // 1. 处理字符串字面量
        let obfuscated = code;
        const stringRegex = /"([^"\\]*(\\.[^"\\]*)*)"/g;
        let matches;
        let replacements = [];
        while ((matches = stringRegex.exec(code)) !== null) {
            const full = matches[0];
            const content = matches[1];
            const charCall = stringToCharCall(content);
            replacements.push({ start: matches.index, end: matches.index + full.length, replacement: charCall });
        }
        for (let i = replacements.length - 1; i >= 0; i--) {
            const r = replacements[i];
            obfuscated = obfuscated.substring(0, r.start) + r.replacement + obfuscated.substring(r.end);
        }

        // 2. 变量名混淆
        obfuscated = obfuscateVariables(obfuscated);

        // 3. 块级状态机混淆
        obfuscated = obfuscateBlock(obfuscated);

        // 4. 压缩空格（但保留换行以便阅读状态机结构）
        // 实际上状态机需要换行才能理解，所以保留换行
        // 但可以压缩多余空格
        obfuscated = obfuscated.replace(/[ \t]+/g, ' ').replace(/ \n/g, '\n');

        // 5. 添加水印
        const finalCode = WATERMARK + '\n\n' + obfuscated;
        return finalCode;
    }

    // UI 交互
    const inputEl = document.getElementById('inputCode');
    const outputEl = document.getElementById('outputCode');
    const obfuscateBtn = document.getElementById('obfuscateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    obfuscateBtn.addEventListener('click', function() {
        const source = inputEl.value;
        if (!source.trim()) {
            outputEl.value = '请先输入 Lua 代码！';
            return;
        }
        try {
            const result = obfuscate(source);
            outputEl.value = result;
        } catch (e) {
            outputEl.value = '混淆出错: ' + e.message + '\n' + e.stack;
        }
    });

    clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.value = '';
    });

    copyBtn.addEventListener('click', function() {
        const text = outputEl.value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = copyBtn.textContent;
            copyBtn.textContent = '✅ 已复制';
            setTimeout(() => copyBtn.textContent = orig, 2000);
        }).catch(() => {
            outputEl.select();
            document.execCommand('copy');
        });
    });

    // 默认示例
    const defaultCode = `function Update()
    if a == true then
        local b = false
        b = true
    end
end

function test(x)
    local y = 0
    for i = 1, 10 do
        y = y + i
    end
    return y
end`;
    inputEl.value = defaultCode;
})();
</script>
</body>
</html>
