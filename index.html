<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoreBox Lua 混淆器 V4 (函数体内置while)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #2a2a2a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }
        h1 {
            text-align: center;
            color: #ffaa33;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .col {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0d0d0d;
            border: 1px solid #555;
            color: #ccc;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 8px;
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #ffaa33;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin: 15px 0 10px;
            flex-wrap: wrap;
        }
        button {
            background: #3a3a3a;
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #555;
            flex: 1;
            min-width: 120px;
        }
        button:hover {
            background: #ffaa33;
            color: #1a1a1a;
            border-color: #ffaa33;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.96);
        }
        .output-container {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
        }
        .copy-btn:hover { opacity: 1; }
        .watermark {
            color: #ffaa33;
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.6;
            text-align: center;
        }
        @media (max-width: 700px) {
            .col { min-width: 100%; }
            textarea { height: 250px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 GoreBox Lua 混淆器 V4 (函数体内置while)</h1>
    <div class="row">
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">📄 原始代码</label>
            <textarea id="inputCode" placeholder="粘贴你的 Lua 代码...">local SS, DD = 78
local myVar = "Hello"
function test(a)
    local b = a + 1
    return b
end</textarea>
        </div>
        <div class="col">
            <label style="margin-bottom:6px; font-weight:bold;">⚡ 混淆结果</label>
            <div class="output-container">
                <textarea id="outputCode" readonly placeholder="混淆后的代码将显示在这里..."></textarea>
                <button class="copy-btn" id="copyBtn">📋 复制</button>
            </div>
        </div>
    </div>
    <div class="buttons">
        <button id="obfuscateBtn">🚀 执行混淆</button>
        <button id="clearBtn">🗑️ 清空</button>
        <button id="uploadBtn">📤 上传Lua文件</button>
        <button id="downloadBtn">📥 下载Lua文件</button>
    </div>
    <div class="watermark">--[[ Koilp混淆V4 独家水印 ]]--</div>
</div>

<script>
(function() {
    // ---------- 配置 ----------
    const WATERMARK = `--[[
Koilp混淆V4独家水印:)

......              .......                             ......
......           .......                                ......
......        .......                            ......    ......
......     .......                               ......    ......  ......     .........
......  ........                 ...............                ......     ......       ......
......  ........             .......        ......      ......    ......    ......          ......
......     .......         .......           .......    ......    ......    ......          ......
......        .......      .......           .......    ......    ......    ......         ......
......           .......    .......         .......     ......    ......    ......   ........
......              ......      ...............         ......    ......    ......
.                                                        ......
  .                                                      ......
    .                                                    ......
       .                                                 ......
                                                        
]]--`;

    // ---------- 工具函数 ----------
    function randomVarName() {
        const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for (let i = 0; i < 30; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        const suffix = Math.floor(Math.random() * 10000000).toString(16);
        return 'v_' + result + '_' + suffix;
    }

    function fourOpExpr(num) {
        const ops = ['+', '-'];
        let parts = [String(num)];
        for (let i = 0; i < 4; i++) {
            const a = Math.floor(Math.random() * 200) + 1;
            const b = Math.floor(Math.random() * 200) + 1;
            const expr = `(${a+b}-${a+b})`;
            const op = ops[Math.floor(Math.random() * ops.length)];
            parts.push(op + expr);
        }
        return '(' + parts.join('') + ')';
    }

    function stringToCharCall(str) {
        if (str === '') return '""';
        const chars = [];
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            const expr = fourOpExpr(code);
            chars.push(expr);
        }
        return 'string.char(' + chars.join(', ') + ')';
    }

    function obfuscateVariables(code) {
        const funcNames = new Set();
        const funcRegex = /(?:local\s+)?function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
        let match;
        while ((match = funcRegex.exec(code)) !== null) {
            funcNames.add(match[1]);
        }

        const localVars = new Set();
        const localDeclRegex = /local\s+((?:[a-zA-Z_]\w*\s*,\s*)*[a-zA-Z_]\w*)/g;
        while ((match = localDeclRegex.exec(code)) !== null) {
            const list = match[1];
            const names = list.split(',').map(s => s.trim());
            for (let name of names) {
                if (name && !funcNames.has(name) && !isKeyword(name)) {
                    localVars.add(name);
                }
            }
        }

        const nameMap = new Map();
        localVars.forEach(name => {
            let newName;
            do {
                newName = randomVarName();
            } while (nameMap.has(newName) || funcNames.has(newName) || isKeyword(newName));
            nameMap.set(name, newName);
        });

        let obfuscated = code;
        nameMap.forEach((newName, oldName) => {
            const regex = new RegExp('\\b' + oldName + '\\b', 'g');
            obfuscated = obfuscated.replace(regex, newName);
        });
        return obfuscated;
    }

    function isKeyword(name) {
        const keywords = ['and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'if', 'in', 'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'];
        return keywords.includes(name);
    }

    // ---------- 核心：在函数体内插入 while true ----------
    function wrapFunctionBodies(code) {
        // 这个函数会找到每个函数定义，将函数体包裹在 while true do ... break end 中
        // 由于 Lua 函数可以嵌套，我们需要递归处理。
        // 使用堆栈法处理嵌套的函数定义。
        let result = '';
        let i = 0;
        const len = code.length;

        // 辅助：判断是否是函数定义开始（忽略字符串和注释中的）
        function isFunctionStart(pos) {
            // 检查从 pos 开始是否是 "function" 单词
            if (code.substr(pos, 8) !== 'function') return false;
            // 确保前面不是字母数字或下划线
            if (pos > 0 && /[a-zA-Z0-9_]/.test(code[pos-1])) return false;
            // 基本判断通过
            return true;
        }

        while (i < len) {
            // 寻找下一个 'function' 关键字
            let found = false;
            let funcStart = -1;
            for (let j = i; j < len; j++) {
                if (isFunctionStart(j)) {
                    // 进一步检查是否是 local function 或 function 定义
                    // 简单检查前面不是 '.' 或 ':'，因为可能是 method
                    // 这里我们简单处理：只要前面不是标识符或点
                    if (j > 0 && (code[j-1] === '.' || code[j-1] === ':')) continue;
                    funcStart = j;
                    found = true;
                    break;
                }
            }
            if (!found) {
                result += code.substring(i);
                break;
            }

            // 复制从 i 到 funcStart 的内容
            result += code.substring(i, funcStart);
            i = funcStart;

            // 现在处理这个函数定义，找到匹配的 'end'
            // 我们需要找到对应的 end，同时处理嵌套的函数和字符串
            let depth = 1; // 当前函数深度（遇到 function 加1，遇到 end 减1）
            let pos = i + 8; // 从 function 后开始
            // 跳过函数名和参数列表
            // 简单找第一个 '(' 和对应的 ')'
            let parenCount = 0;
            let paramEnd = -1;
            for (let k = pos; k < len; k++) {
                if (code[k] === '(') parenCount++;
                else if (code[k] === ')') {
                    parenCount--;
                    if (parenCount === 0) {
                        paramEnd = k;
                        break;
                    }
                }
            }
            if (paramEnd === -1) {
                // 无法解析，跳过
                result += code.substring(i);
                break;
            }
            // 现在从 paramEnd+1 开始，找到函数体开始（可能是一个空格或换行）
            let bodyStart = paramEnd + 1;
            // 跳过空白
            while (bodyStart < len && code[bodyStart] === ' ' || code[bodyStart] === '\t' || code[bodyStart] === '\n' || code[bodyStart] === '\r') {
                bodyStart++;
            }
            // 现在我们需要找到对应的 'end'，考虑嵌套
            let bodyEnd = -1;
            let j = bodyStart;
            let inString = false;
            let inComment = false;
            let stringChar = '';
            while (j < len) {
                // 处理字符串和注释跳过
                if (!inString && !inComment) {
                    if (code[j] === '"' || code[j] === "'") {
                        inString = true;
                        stringChar = code[j];
                        j++;
                        continue;
                    } else if (code[j] === '-' && j+1 < len && code[j+1] === '-') {
                        inComment = true;
                        j += 2;
                        continue;
                    }
                } else if (inString) {
                    if (code[j] === '\\' && j+1 < len) {
                        j += 2;
                        continue;
                    }
                    if (code[j] === stringChar) {
                        inString = false;
                        j++;
                        continue;
                    }
                } else if (inComment) {
                    if (code[j] === '\n') {
                        inComment = false;
                    }
                    j++;
                    continue;
                }

                // 检查关键字
                if (!inString && !inComment) {
                    // 检查是否是 'function' 开始（增加深度）
                    if (code.substr(j, 8) === 'function' && (j === 0 || !/[a-zA-Z0-9_]/.test(code[j-1]))) {
                        depth++;
                        j += 8;
                        continue;
                    }
                    // 检查是否是 'end'（减少深度）
                    if (code.substr(j, 3) === 'end' && (j === 0 || !/[a-zA-Z0-9_]/.test(code[j-1]))) {
                        depth--;
                        if (depth === 0) {
                            bodyEnd = j;
                            break;
                        }
                        j += 3;
                        continue;
                    }
                }
                j++;
            }

            if (bodyEnd === -1) {
                // 没找到匹配的 end，跳过
                result += code.substring(i);
                break;
            }

            // 提取函数体
            let body = code.substring(bodyStart, bodyEnd);
            // 为函数体加上 while true do ... break end
            let wrappedBody = 'while true do ' + body + ' break end';
            // 构建新函数定义
            let funcDef = code.substring(i, bodyStart) + wrappedBody + code.substring(bodyEnd, bodyEnd + 3); // 加上 'end'
            result += funcDef;
            i = bodyEnd + 3; // 跳过 'end'
        }

        return result;
    }

    // ---------- 主混淆函数 ----------
    function obfuscate(code) {
        // 1. 字符串混淆
        let obfuscated = code;
        const stringRegex = /"([^"\\]*(\\.[^"\\]*)*)"/g;
        let matches;
        let replacements = [];
        while ((matches = stringRegex.exec(code)) !== null) {
            const full = matches[0];
            const content = matches[1];
            const charCall = stringToCharCall(content);
            replacements.push({ start: matches.index, end: matches.index + full.length, replacement: charCall });
        }
        for (let i = replacements.length - 1; i >= 0; i--) {
            const r = replacements[i];
            obfuscated = obfuscated.substring(0, r.start) + r.replacement + obfuscated.substring(r.end);
        }

        // 2. 变量名混淆
        obfuscated = obfuscateVariables(obfuscated);

        // 3. 函数体包裹 while true
        obfuscated = wrapFunctionBodies(obfuscated);

        // 4. 压缩为一行（可选，这里保留多行但去除多余空白）
        let lines = obfuscated.split('\n');
        let compressed = lines.map(line => line.trim()).filter(line => line.length > 0).join(' ');
        // 也可以保留换行，但示例中是一行，为了类似风格，我们压缩
        // 但保留函数内的缩进美观？这里我们压缩成一行更接近示例。
        // 为了更接近原混淆风格，我们压缩成一行。
        let oneLine = compressed;

        // 5. 添加水印
        const finalCode = WATERMARK + '\n\n' + oneLine;
        return finalCode;
    }

    // ---------- UI 交互 ----------
    const inputEl = document.getElementById('inputCode');
    const outputEl = document.getElementById('outputCode');
    const obfuscateBtn = document.getElementById('obfuscateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    obfuscateBtn.addEventListener('click', function() {
        const source = inputEl.value;
        try {
            const result = obfuscate(source);
            outputEl.value = result;
        } catch (e) {
            outputEl.value = '混淆出错: ' + e.message;
        }
    });

    clearBtn.addEventListener('click', function() {
        inputEl.value = '';
        outputEl.value = '';
    });

    copyBtn.addEventListener('click', function() {
        const text = outputEl.value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            const orig = copyBtn.textContent;
            copyBtn.textContent = '✅ 已复制';
            setTimeout(() => copyBtn.textContent = orig, 2000);
        }).catch(() => {
            outputEl.select();
            document.execCommand('copy');
        });
    });

    // 上传文件
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.lua,.txt';
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    uploadBtn.addEventListener('click', function() {
        fileInput.click();
    });

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                inputEl.value = ev.target.result;
                outputEl.value = '';
            } catch (err) {
                alert('读取文件失败: ' + err.message);
            }
        };
        reader.readAsText(file, 'UTF-8');
        fileInput.value = '';
    });

    // 下载文件
    downloadBtn.addEventListener('click', function() {
        const content = outputEl.value;
        if (!content || content.trim() === '') {
            alert('没有内容可下载，请先执行混淆。');
            return;
        }
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'obfuscated.lua';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
    });

    // 默认示例
    const defaultCode = `local SS, DD = 78
local myVar = "Hello"
function test(a)
    local b = a + 1
    return b
end`;
    inputEl.value = defaultCode;
})();
</script>
</body>
</html>
